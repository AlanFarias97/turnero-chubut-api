spring:
  application:
    name: turnero-chubut-api
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/turnero_chubut}
    username: ${SPRING_DATASOURCE_USERNAME:turnero}
    password: ${SPRING_DATASOURCE_PASSWORD:turnero}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

turnero:
  cors:
    allowed-origins: ${TURNERO_CORS_ALLOWED_ORIGINS:http://localhost:4200,https://app.turnerochubut.com}
