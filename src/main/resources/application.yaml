spring:
  application:
    name: turnero-chubut-api
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/turnero_chubut}
    username: ${SPRING_DATASOURCE_USERNAME:turnero}
    password: ${SPRING_DATASOURCE_PASSWORD:turnero}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

turnero:
  cors:
    allowed-origins: ${TURNERO_CORS_ALLOWED_ORIGINS:http://localhost:4200,https://app.turnerochubut.com}
  jwt:
    secret: ${TURNERO_JWT_SECRET:turnero-chubut-dev-secret-change-me-please-32chars}
    expiration-minutes: ${TURNERO_JWT_EXPIRATION_MINUTES:480}
  bootstrap:
    admin:
      email: ${TURNERO_ADMIN_EMAIL:}
      password: ${TURNERO_ADMIN_PASSWORD:}
      display-name: ${TURNERO_ADMIN_DISPLAY_NAME:Administrador}
